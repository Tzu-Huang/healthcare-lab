name: Container image

on:
  pull_request:
  push:
    branches:
      - main
  release:
    types:
      - published

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/tzu-huang/healthcare-lab
  DOCKER_METADATA_SHORT_SHA_LENGTH: 7

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: python -m pip install -r requirements.txt

      - name: Run product tests
        run: python -m unittest discover -s tests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build linux/amd64 image without publishing
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          build-args: |
            VCS_REF=${{ github.sha }}
            VERSION=verification

  publish:
    needs: verify
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'release' && github.event.release.prerelease == false)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out publication source
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate stable release contract
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REPOSITORY_VISIBILITY: ${{ github.event.repository.visibility }}
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must be a stable SemVer such as v1.0.0." >&2
            exit 1
          fi
          if [[ "${REPOSITORY_VISIBILITY}" != "public" ]]; then
            echo "Stable releases require a public repository so GHCR images remain anonymous-readable." >&2
            exit 1
          fi

      - name: Verify public GHCR package before stable mutation
        if: github.event_name == 'release'
        run: |
          docker logout ghcr.io >/dev/null 2>&1 || true
          if ! docker buildx imagetools inspect "${IMAGE_NAME}:edge" >/dev/null 2>&1; then
            echo "The GHCR package is not anonymously readable." >&2
            echo "Publish edge from main, set the package visibility to Public in GitHub, then retry the release." >&2
            exit 1
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Guard immutable release version
        id: release_guard
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          if docker pull "${IMAGE_NAME}:${VERSION}" >/dev/null 2>&1; then
            EXISTING_REVISION="$(docker image inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' "${IMAGE_NAME}:${VERSION}")"
            if [[ "${EXISTING_REVISION}" != "${GITHUB_SHA}" ]]; then
              echo "Refusing to overwrite ${IMAGE_NAME}:${VERSION}; it belongs to revision ${EXISTING_REVISION}." >&2
              exit 1
            fi
            echo "Release image already matches ${GITHUB_SHA}; repairing all aliases from its immutable digest."
            echo "reuse_release=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=edge,enable=${{ github.event_name == 'push' }}
            type=sha,prefix=sha-
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}},value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and publish linux/amd64 image
        if: steps.release_guard.outputs.reuse_release != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.event_name == 'release' && github.event.release.tag_name || 'edge' }}

      - name: Repair release aliases from immutable image
        if: github.event_name == 'release' && steps.release_guard.outputs.reuse_release == 'true'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          IFS=. read -r MAJOR MINOR PATCH <<< "${VERSION}"
          SHORT_SHA="${GITHUB_SHA::7}"
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${MAJOR}.${MINOR}" \
            --tag "${IMAGE_NAME}:${MAJOR}" \
            --tag "${IMAGE_NAME}:latest" \
            --tag "${IMAGE_NAME}:sha-${SHORT_SHA}" \
            "${IMAGE_NAME}:${VERSION}"

      - name: Verify anonymous GHCR access
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          IFS=. read -r MAJOR MINOR PATCH <<< "${VERSION}"
          SHORT_SHA="${GITHUB_SHA::7}"
          docker logout ghcr.io
          for TAG in "${VERSION}" "${MAJOR}.${MINOR}" "${MAJOR}" latest "sha-${SHORT_SHA}"; do
            docker buildx imagetools inspect "${IMAGE_NAME}:${TAG}" >/dev/null
          done
