name: interoperability-lab

networks:
  lab:
    name: interoperability-lab

volumes:
  lab-app-instance:
  lab-gdt-bridge:
  oie-appdata:
  medplum-postgres:
  medplum-redis:
  openemr-site:
  openemr-db:
  dcm4chee-archive:
  dcm4chee-db:
  dcm4chee-db-data:
  dcm4chee-ldap:
  dcm4chee-ldap-config:

services:
  lab-app:
    image: ${LAB_APP_IMAGE:-python:3.11-slim}
    env_file:
      - ../.env
    working_dir: /workspace
    command: >
      sh -c "python -m pip install --no-cache-dir -r requirements.txt &&
      python app.py"
    environment:
      LAB_APP_HOST: 0.0.0.0
      LAB_APP_PORT: "5000"
      ECG_FILE_BASE_URL: ${ECG_FILE_BASE_URL:-http://127.0.0.1:5000}
      GDT_BRIDGE_PATH: /data/gdt-bridge
      OPENEMR_DB_HOST: openemr-db
      OPENEMR_DB_PORT: "3306"
      OPENEMR_DB_USER: ${OPENEMR_DB_USER:-openemr}
      OPENEMR_DB_PASSWORD: ${OPENEMR_DB_PASSWORD:-openemr}
      OPENEMR_DB_NAME: ${OPENEMR_DB_NAME:-openemr}
      OPENEMR_GDT_PROCEDURE_CODES: ${OPENEMR_GDT_PROCEDURE_CODES:-1001}
      OIE_MLLP_ORDER_HOST: ${OIE_MLLP_ORDER_HOST:-oie}
      OIE_MLLP_ORDER_PORT: ${OIE_MLLP_ORDER_PORT:-6600}
      OIE_MLLP_RESULT_HOST: ${OIE_MLLP_RESULT_HOST:-0.0.0.0}
      OIE_MLLP_RESULT_PORT: ${OIE_MLLP_RESULT_PORT:-6665}
      DCM4CHEE_WEB_UI_URL: ${DCM4CHEE_WEB_UI_URL:-http://127.0.0.1:8082/dcm4chee-arc/ui2}
      DCM4CHEE_DIMSE_HOST: ${DCM4CHEE_DIMSE_HOST:-dcm4chee}
      DCM4CHEE_DIMSE_PORT: ${DCM4CHEE_DIMSE_PORT:-11112}
      DCM4CHEE_MWL_AE_TITLE: ${DCM4CHEE_MWL_AE_TITLE:-WORKLIST}
      DCM4CHEE_HL7_HOST: ${DCM4CHEE_HL7_HOST:-dcm4chee}
      DCM4CHEE_HL7_PORT: ${DCM4CHEE_HL7_PORT:-2575}
      DCM4CHEE_DICOMWEB_BASE_URL: ${DCM4CHEE_DICOMWEB_BASE_URL:-http://dcm4chee:8080/dcm4chee-arc/aets/WORKLIST/rs}
    ports:
      - "${LAB_APP_PORT:-5000}:5000"
    expose:
      - "6665"
      - "5000"
    volumes:
      - ..:/workspace
      - lab-app-instance:/workspace/instance
      - ${GDT_BRIDGE_HOST_PATH:-../instance/gdt-bridge}:/data/gdt-bridge
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - lab
    depends_on:
      - openemr-db

  oie:
    image: ${OIE_IMAGE:-nextgenhealthcare/connect:4.5.2}
    environment:
      DATABASE: ${OIE_DATABASE:-derby}
    ports:
      - "${OIE_HTTP_PORT:-18080}:8080"
      - "${OIE_HTTPS_PORT:-10443}:8443"
      - "0.0.0.0:${OIE_MLLP_RESULT_PORT:-6661}:6661"
      - "${OIE_MLLP_ORDER_PORT:-6600}:6600"
    expose:
      - "6671"
      - "6661"
    volumes:
      - oie-appdata:/opt/connect/appdata
    networks:
      - lab

  medplum-postgres:
    image: ${MEDPLUM_POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_DB: ${MEDPLUM_POSTGRES_DB:-medplum}
      POSTGRES_USER: ${MEDPLUM_POSTGRES_USER:-medplum}
      POSTGRES_PASSWORD: ${MEDPLUM_POSTGRES_PASSWORD:-medplum}
    volumes:
      - medplum-postgres:/var/lib/postgresql/data
    networks:
      - lab

  medplum-redis:
    image: ${MEDPLUM_REDIS_IMAGE:-redis:7-alpine}
    volumes:
      - medplum-redis:/data
    networks:
      - lab

  medplum:
    image: ${MEDPLUM_IMAGE:-medplum/medplum-server:latest}
    command: "env:"
    environment:
      MEDPLUM_BASE_URL: ${MEDPLUM_BASE_URL:-http://127.0.0.1:8103/}
      MEDPLUM_APP_BASE_URL: ${MEDPLUM_APP_BASE_URL:-http://127.0.0.1:3000/}
      MEDPLUM_ALLOWED_ORIGINS: ${MEDPLUM_ALLOWED_ORIGINS:-http://127.0.0.1:3000,http://localhost:3000}
      MEDPLUM_RECAPTCHA_SITE_KEY: ${MEDPLUM_RECAPTCHA_SITE_KEY:-6LfHdsYdAAAAAC0uLnnRrDrhcXnziiUwKd8VtLNq}
      MEDPLUM_RECAPTCHA_SECRET_KEY: ${MEDPLUM_RECAPTCHA_SECRET_KEY:-}
      MEDPLUM_DATABASE_HOST: medplum-postgres
      MEDPLUM_DATABASE_PORT: "5432"
      MEDPLUM_DATABASE_DBNAME: ${MEDPLUM_POSTGRES_DB:-medplum}
      MEDPLUM_DATABASE_USERNAME: ${MEDPLUM_POSTGRES_USER:-medplum}
      MEDPLUM_DATABASE_PASSWORD: ${MEDPLUM_POSTGRES_PASSWORD:-medplum}
      MEDPLUM_REDIS_HOST: medplum-redis
      MEDPLUM_REDIS_PORT: "6379"
    ports:
      - "${MEDPLUM_PORT:-8103}:8103"
    depends_on:
      - medplum-postgres
      - medplum-redis
    networks:
      - lab

  medplum-app:
    image: ${MEDPLUM_APP_IMAGE:-medplum/medplum-app:latest}
    environment:
      MEDPLUM_BASE_URL: ${MEDPLUM_PUBLIC_BASE_URL:-http://127.0.0.1:8103/}
      MEDPLUM_RECAPTCHA_SITE_KEY: ${MEDPLUM_RECAPTCHA_SITE_KEY:-6LfHdsYdAAAAAC0uLnnRrDrhcXnziiUwKd8VtLNq}
    ports:
      - "${MEDPLUM_APP_PORT:-3000}:3000"
    depends_on:
      - medplum
    networks:
      - lab

  openemr-db:
    image: ${OPENEMR_DB_IMAGE:-mariadb:10.11}
    environment:
      MYSQL_ROOT_PASSWORD: ${OPENEMR_DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${OPENEMR_DB_NAME:-openemr}
      MYSQL_USER: ${OPENEMR_DB_USER:-openemr}
      MYSQL_PASSWORD: ${OPENEMR_DB_PASSWORD:-openemr}
    volumes:
      - openemr-db:/var/lib/mysql
    networks:
      - lab

  openemr:
    image: ${OPENEMR_IMAGE:-openemr/openemr:7.0.2}
    environment:
      MYSQL_HOST: openemr-db
      MYSQL_ROOT_PASS: ${OPENEMR_DB_ROOT_PASSWORD:-root}
      MYSQL_USER: ${OPENEMR_DB_USER:-openemr}
      MYSQL_PASS: ${OPENEMR_DB_PASSWORD:-openemr}
      MYSQL_DATABASE: ${OPENEMR_DB_NAME:-openemr}
      OE_SITE: default
    ports:
      - "${OPENEMR_PORT:-8088}:80"
    volumes:
      - openemr-site:/var/www/localhost/htdocs/openemr/sites
      - ${GDT_BRIDGE_HOST_PATH:-../instance/gdt-bridge}:/data/gdt-bridge
    depends_on:
      - openemr-db
    networks:
      - lab

  dcm4chee-db:
    image: ${DCM4CHEE_DB_IMAGE:-dcm4che/postgres-dcm4chee:16.13-35}
    environment:
      POSTGRES_DB: ${DCM4CHEE_DB_NAME:-pacsdb}
      POSTGRES_USER: ${DCM4CHEE_DB_USER:-pacs}
      POSTGRES_PASSWORD: ${DCM4CHEE_DB_PASSWORD:-pacs}
    volumes:
      - dcm4chee-db-data:/var/lib/postgresql/data
    networks:
      - lab

  ldap:
    image: ${DCM4CHEE_LDAP_IMAGE:-dcm4che/slapd-dcm4chee:2.6.13-35.0}
    environment:
      LDAP_ROOTPASS: ${DCM4CHEE_LDAP_ROOTPASS:-secret}
      STORAGE_DIR: ${DCM4CHEE_STORAGE_DIR:-/storage/fs1}
    volumes:
      - dcm4chee-ldap:/var/lib/openldap/openldap-data
      - dcm4chee-ldap-config:/etc/openldap/slapd.d
    networks:
      - lab

  dcm4chee:
    image: ${DCM4CHEE_IMAGE:-dcm4che/dcm4chee-arc-psql:5.35.0}
    environment:
      POSTGRES_DB: ${DCM4CHEE_DB_NAME:-pacsdb}
      POSTGRES_USER: ${DCM4CHEE_DB_USER:-pacs}
      POSTGRES_PASSWORD: ${DCM4CHEE_DB_PASSWORD:-pacs}
      POSTGRES_HOST: dcm4chee-db
      LDAP_ROOTPASS: ${DCM4CHEE_LDAP_ROOTPASS:-secret}
      LDAP_URL: ${DCM4CHEE_LDAP_URL:-ldap://ldap:389}
      LDAP_BASE_DN: ${DCM4CHEE_LDAP_BASE_DN:-dc=dcm4che,dc=org}
    ports:
      - "${DCM4CHEE_HTTP_PORT:-8082}:8080"
      - "${DCM4CHEE_DICOM_PORT:-11112}:11112"
      - "${DCM4CHEE_HL7_PORT:-2575}:2575"
    volumes:
      - dcm4chee-archive:/storage
    depends_on:
      - dcm4chee-db
      - ldap
    networks:
      - lab
