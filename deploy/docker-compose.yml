name: interoperability-lab

networks:
  lab:
    name: interoperability-lab

volumes:
  lab-app-instance:
  lab-gdt-bridge:
  oie-appdata:
  medplum-postgres:
  medplum-redis:
  dcm4chee-archive:
  dcm4chee-db:
  dcm4chee-db-data:
  dcm4chee-ldap:
  dcm4chee-ldap-config:

secrets:
  medplum_client_secret:
    environment: MEDPLUM_CLIENT_SECRET
  openemr_db_password:
    environment: OPENEMR_DB_PASSWORD
  dcm4chee_password:
    environment: DCM4CHEE_PASSWORD
  dcm4chee_token:
    environment: DCM4CHEE_TOKEN
  dcm4chee_client_secret:
    environment: DCM4CHEE_CLIENT_SECRET

services:
  lab-app:
    image: ${LAB_APP_IMAGE:-ghcr.io/tzu-huang/healthcare-lab:1.0.1}
    environment:
      LAB_APP_HOST: 0.0.0.0
      LAB_APP_PORT: "5000"
      ECG_FILE_BASE_URL: ${ECG_FILE_BASE_URL:-http://127.0.0.1:5000}
      GDT_BRIDGE_PATH: /data/gdt-bridge
      # Compatibility bootstrap only: these values seed a missing typed
      # profile once. Persisted Settings remain authoritative after creation.
      MEDPLUM_CLIENT_ID: ${MEDPLUM_CLIENT_ID:-}
      MEDPLUM_SCOPE: ${MEDPLUM_SCOPE:-}
      MEDPLUM_TOKEN_URL: ${MEDPLUM_TOKEN_URL:-}
      MEDPLUM_AUTH_GRACE_SECONDS: ${MEDPLUM_AUTH_GRACE_SECONDS:-300}
      MEDPLUM_TIMEOUT_SECONDS: ${MEDPLUM_TIMEOUT_SECONDS:-10}
      MEDPLUM_WEB_UI_URL: ${MEDPLUM_WEB_UI_URL:-http://127.0.0.1:3000}
      GDT_BRIDGE_IMPORT_SUCCESS_MODE: ${GDT_BRIDGE_IMPORT_SUCCESS_MODE:-archive}
      GDT_BRIDGE_FILENAME_PROFILE: ${GDT_BRIDGE_FILENAME_PROFILE:-permissive}
      GDT_BRIDGE_RECEIVER_ID: ${GDT_BRIDGE_RECEIVER_ID:-}
      GDT_BRIDGE_SENDER_ID: ${GDT_BRIDGE_SENDER_ID:-}
      GDT_BRIDGE_WATCH_POLL_SECONDS: ${GDT_BRIDGE_WATCH_POLL_SECONDS:-2}
      GDT_BRIDGE_STABLE_SECONDS: ${GDT_BRIDGE_STABLE_SECONDS:-1}
      OPENEMR_DB_HOST: ${OPENEMR_DB_HOST:-}
      OPENEMR_DB_PORT: ${OPENEMR_DB_PORT:-3306}
      OPENEMR_DB_USER: ${OPENEMR_DB_USER:-openemr}
      OPENEMR_DB_NAME: ${OPENEMR_DB_NAME:-openemr}
      OPENEMR_GDT_PROCEDURE_CODES: ${OPENEMR_GDT_PROCEDURE_CODES:-1001}
      OIE_MLLP_ORDER_HOST: ${OIE_MLLP_ORDER_HOST:-oie}
      OIE_MLLP_ORDER_PORT: ${OIE_MLLP_ORDER_PORT:-6600}
      OIE_BOOTSTRAP_MODE: ${OIE_BOOTSTRAP_MODE:-create-missing}
      OIE_BOOTSTRAP_TIMEOUT_SECONDS: ${OIE_BOOTSTRAP_TIMEOUT_SECONDS:-120}
      OIE_BOOTSTRAP_RETRY_INTERVAL_SECONDS: ${OIE_BOOTSTRAP_RETRY_INTERVAL_SECONDS:-2}
      # The application still consumes the historical OIE_MLLP_RESULT_* names.
      # Compose maps the unambiguous HLAB listener settings to them. The legacy
      # aliases are accepted for one migration window and affect lab-app only.
      OIE_MLLP_RESULT_HOST: ${HLAB_RESULT_LISTENER_HOST:-${OIE_MLLP_RESULT_HOST:-0.0.0.0}}
      OIE_MLLP_RESULT_PORT: ${HLAB_RESULT_LISTENER_PORT:-${OIE_MLLP_RESULT_PORT:-6665}}
      DCM4CHEE_WEB_UI_URL: ${DCM4CHEE_WEB_UI_URL:-http://127.0.0.1:8082/dcm4chee-arc/ui2}
      DCM4CHEE_DIMSE_HOST: ${DCM4CHEE_DIMSE_HOST:-dcm4chee}
      DCM4CHEE_DIMSE_PORT: ${DCM4CHEE_DIMSE_PORT:-11112}
      DCM4CHEE_MWL_AE_TITLE: ${DCM4CHEE_MWL_AE_TITLE:-WORKLIST}
      DCM4CHEE_HL7_HOST: ${DCM4CHEE_HL7_HOST:-dcm4chee}
      DCM4CHEE_HL7_PORT: ${DCM4CHEE_HL7_PORT:-2575}
      DCM4CHEE_DICOMWEB_BASE_URL: ${DCM4CHEE_DICOMWEB_BASE_URL:-http://dcm4chee:8080/dcm4chee-arc/aets/WORKLIST/rs}
      DCM4CHEE_QIDO_RS_URL: ${DCM4CHEE_QIDO_RS_URL:-http://dcm4chee:8080/dcm4chee-arc/aets/DCM4CHEE/rs}
      DCM4CHEE_WADO_RS_URL: ${DCM4CHEE_WADO_RS_URL:-http://dcm4chee:8080/dcm4chee-arc/aets/DCM4CHEE/rs}
      DCM4CHEE_STOW_RS_URL: ${DCM4CHEE_STOW_RS_URL:-http://dcm4chee:8080/dcm4chee-arc/aets/DCM4CHEE/rs}
      DCM4CHEE_PROFILE_NAME: ${DCM4CHEE_PROFILE_NAME:-local-dcm4chee}
      DCM4CHEE_DISPLAY_NAME: ${DCM4CHEE_DISPLAY_NAME:-dcm4chee Local Archive}
      DCM4CHEE_ENVIRONMENT_NAME: ${DCM4CHEE_ENVIRONMENT_NAME:-local-docker}
      DCM4CHEE_CALLED_AE_TITLE: ${DCM4CHEE_CALLED_AE_TITLE:-DCM4CHEE}
      DCM4CHEE_CALLING_AE_TITLE: ${DCM4CHEE_CALLING_AE_TITLE:-HEALTHCARE_LAB}
      DCM4CHEE_DEFAULT_SCHEDULED_STATION_AE_TITLE: ${DCM4CHEE_DEFAULT_SCHEDULED_STATION_AE_TITLE:-ECG_AP}
      DCM4CHEE_HL7_SENDING_APPLICATION: ${DCM4CHEE_HL7_SENDING_APPLICATION:-HEALTHCARE_LAB}
      DCM4CHEE_HL7_SENDING_FACILITY: ${DCM4CHEE_HL7_SENDING_FACILITY:-LAB_APP}
      DCM4CHEE_HL7_RECEIVING_APPLICATION: ${DCM4CHEE_HL7_RECEIVING_APPLICATION:-DCM4CHEE}
      DCM4CHEE_HL7_RECEIVING_FACILITY: ${DCM4CHEE_HL7_RECEIVING_FACILITY:-DCM4CHEE}
      DCM4CHEE_PATIENT_ASSIGNING_AUTHORITY: ${DCM4CHEE_PATIENT_ASSIGNING_AUTHORITY:-local-dcm4chee}
      DCM4CHEE_VIEWER_STUDY_URL_TEMPLATE: ${DCM4CHEE_VIEWER_STUDY_URL_TEMPLATE:-}
      DCM4CHEE_UID_ROOT: ${DCM4CHEE_UID_ROOT:-1.2.826.0.1.3680043.10.543}
      DCM4CHEE_AUTH_MODE: ${DCM4CHEE_AUTH_MODE:-none}
      DCM4CHEE_TLS_ENABLED: ${DCM4CHEE_TLS_ENABLED:-false}
      DCM4CHEE_TLS_VERIFY: ${DCM4CHEE_TLS_VERIFY:-true}
      DCM4CHEE_USERNAME: ${DCM4CHEE_USERNAME:-}
      DCM4CHEE_TOKEN_URL: ${DCM4CHEE_TOKEN_URL:-}
      DCM4CHEE_CERTIFICATE_PATH: ${DCM4CHEE_CERTIFICATE_PATH:-}
      DCM4CHEE_PRIVATE_KEY_PATH: ${DCM4CHEE_PRIVATE_KEY_PATH:-}
    secrets:
      - source: medplum_client_secret
        target: MEDPLUM_CLIENT_SECRET
      - source: openemr_db_password
        target: OPENEMR_DB_PASSWORD
      - source: dcm4chee_password
        target: DCM4CHEE_PASSWORD
      - source: dcm4chee_token
        target: DCM4CHEE_TOKEN
      - source: dcm4chee_client_secret
        target: DCM4CHEE_CLIENT_SECRET
    ports:
      - "${LAB_APP_PORT:-5000}:5000"
    expose:
      - "6665"
      - "5000"
    volumes:
      - lab-app-instance:/app/instance
      - type: bind
        source: ${GDT_BRIDGE_HOST_PATH:-../instance/gdt-bridge}
        target: /data/gdt-bridge
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - lab

  oie:
    image: ${OIE_IMAGE:-nextgenhealthcare/connect:4.5.2@sha256:4afa295cfe7c5ffd596efee69594157fea87202e33d66bb4a98a52db4598f836}
    environment:
      DATABASE: ${OIE_DATABASE:-derby}
    ports:
      - "${OIE_HTTP_PORT:-8080}:8080"
      - "${OIE_HTTPS_PORT:-8443}:8443"
      - "0.0.0.0:${OIE_AP_RESULT_INGRESS_HOST_PORT:-6661}:6661"
      - "${OIE_ORDER_INGRESS_HOST_PORT:-6600}:6600"
    expose:
      - "6671"
      - "6661"
    volumes:
      - oie-appdata:/opt/connect/appdata
    networks:
      - lab

  medplum-postgres:
    image: ${MEDPLUM_POSTGRES_IMAGE:-postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb}
    environment:
      POSTGRES_DB: ${MEDPLUM_POSTGRES_DB:-medplum}
      POSTGRES_USER: ${MEDPLUM_POSTGRES_USER:-medplum}
      POSTGRES_PASSWORD: ${MEDPLUM_POSTGRES_PASSWORD:-medplum}
    volumes:
      - medplum-postgres:/var/lib/postgresql/data
    networks:
      - lab

  medplum-redis:
    image: ${MEDPLUM_REDIS_IMAGE:-redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99}
    volumes:
      - medplum-redis:/data
    networks:
      - lab

  medplum:
    image: ${MEDPLUM_IMAGE:-medplum/medplum-server@sha256:4d2c8e926fe536176a88a7e24555f97f92226e39f171bd0b5f0c7f667d0bf9f0}
    command: "env:"
    environment:
      MEDPLUM_BASE_URL: ${MEDPLUM_BASE_URL:-http://127.0.0.1:8103/}
      MEDPLUM_APP_BASE_URL: ${MEDPLUM_APP_BASE_URL:-http://127.0.0.1:3000/}
      MEDPLUM_ALLOWED_ORIGINS: ${MEDPLUM_ALLOWED_ORIGINS:-http://127.0.0.1:3000,http://localhost:3000}
      MEDPLUM_RECAPTCHA_SITE_KEY: ${MEDPLUM_RECAPTCHA_SITE_KEY:-6LfHdsYdAAAAAC0uLnnRrDrhcXnziiUwKd8VtLNq}
      MEDPLUM_RECAPTCHA_SECRET_KEY: ${MEDPLUM_RECAPTCHA_SECRET_KEY:-}
      MEDPLUM_DATABASE_HOST: medplum-postgres
      MEDPLUM_DATABASE_PORT: "5432"
      MEDPLUM_DATABASE_DBNAME: ${MEDPLUM_POSTGRES_DB:-medplum}
      MEDPLUM_DATABASE_USERNAME: ${MEDPLUM_POSTGRES_USER:-medplum}
      MEDPLUM_DATABASE_PASSWORD: ${MEDPLUM_POSTGRES_PASSWORD:-medplum}
      MEDPLUM_REDIS_HOST: medplum-redis
      MEDPLUM_REDIS_PORT: "6379"
    ports:
      - "${MEDPLUM_PORT:-8103}:8103"
    depends_on:
      - medplum-postgres
      - medplum-redis
    networks:
      - lab

  medplum-app:
    image: ${MEDPLUM_APP_IMAGE:-medplum/medplum-app@sha256:79f162f7124a8932c2a76fc2c7c72df4b080d5fef43496c64bc34ad68e65ca56}
    environment:
      MEDPLUM_BASE_URL: ${MEDPLUM_PUBLIC_BASE_URL:-http://127.0.0.1:8103/}
      MEDPLUM_RECAPTCHA_SITE_KEY: ${MEDPLUM_RECAPTCHA_SITE_KEY:-6LfHdsYdAAAAAC0uLnnRrDrhcXnziiUwKd8VtLNq}
    ports:
      - "${MEDPLUM_APP_PORT:-3000}:3000"
    depends_on:
      - medplum
    networks:
      - lab

  dcm4chee-db:
    image: ${DCM4CHEE_DB_IMAGE:-dcm4che/postgres-dcm4chee:16.13-35@sha256:1fced918fa507a133ec98db6ad2af92be2db0399c4061d5d59a4405ac445cd70}
    environment:
      POSTGRES_DB: ${DCM4CHEE_DB_NAME:-pacsdb}
      POSTGRES_USER: ${DCM4CHEE_DB_USER:-pacs}
      POSTGRES_PASSWORD: ${DCM4CHEE_DB_PASSWORD:-pacs}
    volumes:
      - dcm4chee-db-data:/var/lib/postgresql/data
    networks:
      - lab

  ldap:
    image: ${DCM4CHEE_LDAP_IMAGE:-dcm4che/slapd-dcm4chee:2.6.13-35.0@sha256:ca45eaf70d92c4008612ab345a566e06c13b553b079ccf6c652ceda4c9a98b98}
    environment:
      LDAP_ROOTPASS: ${DCM4CHEE_LDAP_ROOTPASS:-secret}
      STORAGE_DIR: ${DCM4CHEE_STORAGE_DIR:-/storage/fs1}
    volumes:
      - dcm4chee-ldap:/var/lib/openldap/openldap-data
      - dcm4chee-ldap-config:/etc/openldap/slapd.d
    networks:
      - lab

  dcm4chee-storage-init:
    image: ${DCM4CHEE_IMAGE:-dcm4che/dcm4chee-arc-psql:5.35.0@sha256:20a195c0c53336e1d0c7bdc30536d46611a939f0a2e25dec3318c8d99d7fba29}
    user: root
    entrypoint: ["/bin/sh", "-c"]
    environment:
      STORAGE_DIR: ${DCM4CHEE_STORAGE_DIR:-/storage/fs1}
    command:
      - >-
        mkdir -p "$${STORAGE_DIR}" &&
        chown wildfly:wildfly "$${STORAGE_DIR}" &&
        chmod 0775 "$${STORAGE_DIR}"
    volumes:
      - dcm4chee-archive:/storage
    restart: "no"
    networks:
      - lab

  dcm4chee:
    image: ${DCM4CHEE_IMAGE:-dcm4che/dcm4chee-arc-psql:5.35.0@sha256:20a195c0c53336e1d0c7bdc30536d46611a939f0a2e25dec3318c8d99d7fba29}
    environment:
      POSTGRES_DB: ${DCM4CHEE_DB_NAME:-pacsdb}
      POSTGRES_USER: ${DCM4CHEE_DB_USER:-pacs}
      POSTGRES_PASSWORD: ${DCM4CHEE_DB_PASSWORD:-pacs}
      POSTGRES_HOST: dcm4chee-db
      LDAP_ROOTPASS: ${DCM4CHEE_LDAP_ROOTPASS:-secret}
      LDAP_URL: ${DCM4CHEE_LDAP_URL:-ldap://ldap:389}
      LDAP_BASE_DN: ${DCM4CHEE_LDAP_BASE_DN:-dc=dcm4che,dc=org}
    ports:
      - "${DCM4CHEE_HTTP_PORT:-8082}:8080"
      - "${DCM4CHEE_DICOM_PORT:-11112}:11112"
      - "${DCM4CHEE_HL7_HOST_PORT:-2575}:2575"
    volumes:
      - dcm4chee-archive:/storage
    depends_on:
      dcm4chee-storage-init:
        condition: service_completed_successfully
      dcm4chee-db:
        condition: service_started
      ldap:
        condition: service_started
    networks:
      - lab
