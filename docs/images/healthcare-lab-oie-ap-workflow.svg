<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbfb"/>
      <stop offset="58%" stop-color="#edf4f5"/>
      <stop offset="100%" stop-color="#f7f4ec"/>
    </linearGradient>
    <linearGradient id="containerFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e7f2f4"/>
      <stop offset="100%" stop-color="#f5f8f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#1f2d2e" flood-opacity="0.14"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#ffffff" flood-opacity="0.85"/>
    </filter>
    <marker id="ormArrow" markerWidth="18" markerHeight="18" refX="14" refY="9" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L16,9 L2,16 Z" fill="#2f6f73"/>
    </marker>
    <marker id="oruArrow" markerWidth="18" markerHeight="18" refX="14" refY="9" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L16,9 L2,16 Z" fill="#b46b35"/>
    </marker>
    <style>
      .title { font-family: "Segoe UI", Arial, sans-serif; font-size: 52px; font-weight: 680; fill: #172321; letter-spacing: 0; }
      .subtitle { font-family: "Segoe UI", Arial, sans-serif; font-size: 23px; font-weight: 420; fill: #5d6d68; letter-spacing: 0; }
      .frame-title { font-family: "Segoe UI", Arial, sans-serif; font-size: 25px; font-weight: 700; fill: #2b5158; letter-spacing: 1px; }
      .node-title { font-family: "Segoe UI", Arial, sans-serif; font-size: 42px; font-weight: 720; fill: #172321; letter-spacing: 0; }
      .node-sub { font-family: "Segoe UI", Arial, sans-serif; font-size: 22px; font-weight: 430; fill: #5e6c69; letter-spacing: 0; }
      .tag { font-family: "Segoe UI", Arial, sans-serif; font-size: 20px; font-weight: 760; fill: #172321; letter-spacing: 0; }
      .tag-small { font-family: "Segoe UI", Arial, sans-serif; font-size: 17px; font-weight: 440; fill: #53625f; letter-spacing: 0; }
      .port { font-family: "Consolas", "Segoe UI Mono", monospace; font-size: 22px; font-weight: 700; fill: #172321; letter-spacing: 0; }
      .micro { font-family: "Segoe UI", Arial, sans-serif; font-size: 15px; font-weight: 600; fill: #7b8784; letter-spacing: 1.3px; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <g opacity="0.45">
    <path d="M150 220 H1770" stroke="#dce5e3"/>
    <path d="M150 858 H1770" stroke="#dce5e3"/>
    <path d="M320 150 V930" stroke="#dce5e3"/>
    <path d="M1600 150 V930" stroke="#dce5e3"/>
  </g>

  <text x="150" y="116" class="title">Healthcare Lab / OIE / AP Workflow</text>
  <text x="151" y="156" class="subtitle">ORM order path and ORU result return with Docker boundary and ports</text>

  <g>
    <rect x="170" y="246" width="1065" height="650" rx="34" fill="url(#containerFill)" stroke="#b9d2d8" stroke-width="3"/>
    <path d="M210 318 H1195" stroke="#c9dde1" stroke-width="2"/>
    <text x="218" y="296" class="frame-title">DOCKER CONTAINER</text>
    <text x="1060" y="296" text-anchor="end" class="micro">LAB-APP + OIE NETWORK</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="260" y="430" width="365" height="220" rx="28" fill="#ffffff" stroke="#d5e0dc"/>
    <rect x="292" y="466" width="74" height="74" rx="17" fill="#dfeeed"/>
    <path d="M309 502 H349 M329 482 V522" stroke="#2f6f73" stroke-width="7" stroke-linecap="round"/>
    <text x="400" y="514" class="node-title">Dashboard</text>
    <text x="294" y="591" class="node-sub">Healthcare Lab UI</text>
    <text x="294" y="626" class="node-sub">Order inventory / result ledger</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="802" y="430" width="345" height="220" rx="28" fill="#ffffff" stroke="#d5e0dc"/>
    <rect x="834" y="466" width="74" height="74" rx="17" fill="#e1eff2"/>
    <path d="M852 488 H890 M852 508 H890 M852 528 H878" stroke="#2b6d78" stroke-width="6" stroke-linecap="round"/>
    <text x="934" y="514" class="node-title">OIE</text>
    <text x="836" y="591" class="node-sub">HL7 routing engine</text>
    <text x="836" y="626" class="node-sub">Order + result channels</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1412" y="430" width="345" height="220" rx="28" fill="#ffffff" stroke="#d5e0dc"/>
    <rect x="1444" y="466" width="74" height="74" rx="17" fill="#f3e6d5"/>
    <path d="M1460 522 C1475 483 1501 483 1516 522 M1469 522 H1507" stroke="#b46b35" stroke-width="6" fill="none" stroke-linecap="round"/>
    <text x="1545" y="514" class="node-title">AP</text>
    <text x="1446" y="591" class="node-sub">ECG AP simulator</text>
    <text x="1446" y="626" class="node-sub">Listener + result sender</text>
  </g>

  <g fill="none" stroke-linecap="round" stroke-width="9">
    <path d="M625 490 C685 455 742 455 802 490" stroke="#2f6f73" marker-end="url(#ormArrow)"/>
    <path d="M1147 489 C1235 414 1328 413 1412 489" stroke="#2f6f73" marker-end="url(#ormArrow)"/>
    <path d="M1412 594 C1324 687 1236 688 1147 594" stroke="#b46b35" marker-end="url(#oruArrow)"/>
    <path d="M802 594 C738 690 689 690 625 594" stroke="#b46b35" marker-end="url(#oruArrow)"/>
  </g>

  <g filter="url(#soft)">
    <rect x="650" y="342" width="290" height="100" rx="14" fill="#ffffff" stroke="#cddbd7"/>
    <text x="795" y="378" text-anchor="middle" class="tag">ORM^O01</text>
    <text x="795" y="409" text-anchor="middle" class="tag-small">Dashboard to OIE</text>
    <text x="795" y="434" text-anchor="middle" class="port">oie:6600</text>

    <rect x="1206" y="342" width="322" height="100" rx="14" fill="#ffffff" stroke="#cddbd7"/>
    <text x="1367" y="378" text-anchor="middle" class="tag">ORM^O01</text>
    <text x="1367" y="409" text-anchor="middle" class="tag-small">OIE routes order to AP</text>
    <text x="1367" y="434" text-anchor="middle" class="port">AP:6671</text>

    <rect x="1206" y="678" width="322" height="100" rx="14" fill="#ffffff" stroke="#cddbd7"/>
    <text x="1367" y="714" text-anchor="middle" class="tag">ORU^R01 / ORU^W01</text>
    <text x="1367" y="745" text-anchor="middle" class="tag-small">AP returns result to OIE</text>
    <text x="1367" y="770" text-anchor="middle" class="port">OIE:6661</text>

    <rect x="650" y="678" width="290" height="100" rx="14" fill="#ffffff" stroke="#cddbd7"/>
    <text x="795" y="714" text-anchor="middle" class="tag">ORU^R01 / ORU^W01</text>
    <text x="795" y="745" text-anchor="middle" class="tag-small">OIE routes result back</text>
    <text x="795" y="770" text-anchor="middle" class="port">Dashboard:6665</text>
  </g>

  <g>
    <rect x="150" y="930" width="265" height="44" rx="22" fill="#ffffff" stroke="#d8e2df"/>
    <circle cx="182" cy="952" r="7" fill="#2f6f73"/>
    <text x="202" y="958" class="micro">ORM ORDER FLOW</text>
    <rect x="438" y="930" width="270" height="44" rx="22" fill="#ffffff" stroke="#d8e2df"/>
    <circle cx="470" cy="952" r="7" fill="#b46b35"/>
    <text x="490" y="958" class="micro">ORU RESULT FLOW</text>
  </g>
</svg>
