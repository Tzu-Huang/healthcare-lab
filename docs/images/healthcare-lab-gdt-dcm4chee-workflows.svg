<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1200" viewBox="0 0 1920 1200">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1,1 L11,6 L1,11 Z" fill="#222"/>
    </marker>
    <marker id="dashArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1,1 L11,6 L1,11 Z" fill="#666"/>
    </marker>
    <style>
      .title { font-family: "Segoe UI", Arial, sans-serif; font-size: 42px; font-weight: 700; fill: #111; }
      .section { font-family: "Segoe UI", Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #111; }
      .frame-label { font-family: "Segoe UI", Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #333; }
      .node-title { font-family: "Segoe UI", Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #111; }
      .node-sub { font-family: "Segoe UI", Arial, sans-serif; font-size: 18px; font-weight: 400; fill: #333; }
      .label { font-family: "Segoe UI", Arial, sans-serif; font-size: 18px; font-weight: 600; fill: #111; }
      .small { font-family: "Segoe UI", Arial, sans-serif; font-size: 16px; font-weight: 400; fill: #333; }
      .port { font-family: Consolas, "Segoe UI Mono", monospace; font-size: 18px; font-weight: 700; fill: #111; }
    </style>
  </defs>

  <rect width="1920" height="1200" fill="#fff"/>
  <text x="80" y="70" class="title">Healthcare Lab Simple Workflows</text>

  <text x="80" y="132" class="section">GDT Workflow</text>
  <rect x="80" y="160" width="1000" height="390" rx="10" fill="none" stroke="#333" stroke-width="2"/>
  <text x="110" y="195" class="frame-label">Docker Container</text>

  <rect x="170" y="290" width="280" height="110" rx="8" fill="#fff" stroke="#222" stroke-width="2"/>
  <text x="310" y="334" text-anchor="middle" class="node-title">Dashboard</text>
  <text x="310" y="365" text-anchor="middle" class="node-sub">Healthcare Lab UI</text>

  <rect x="640" y="290" width="280" height="110" rx="8" fill="#fff" stroke="#222" stroke-width="2"/>
  <text x="780" y="334" text-anchor="middle" class="node-title">GDT Bridge</text>
  <text x="780" y="365" text-anchor="middle" class="node-sub">shared folder adapter</text>

  <rect x="1440" y="290" width="280" height="110" rx="8" fill="#fff" stroke="#222" stroke-width="2"/>
  <text x="1580" y="334" text-anchor="middle" class="node-title">AP</text>
  <text x="1580" y="365" text-anchor="middle" class="node-sub">ECG AP simulator</text>

  <rect x="485" y="452" width="260" height="66" rx="8" fill="#fff" stroke="#666" stroke-width="2"/>
  <text x="615" y="480" text-anchor="middle" class="node-title" style="font-size:22px">Local SQLite DB</text>
  <text x="615" y="506" text-anchor="middle" class="node-sub" style="font-size:15px">GDT order/result ledger</text>

  <path d="M450 315 H640" fill="none" stroke="#222" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="545" y="268" text-anchor="middle" class="label">GDT order context</text>
  <text x="545" y="292" text-anchor="middle" class="small">local API / no external port</text>

  <path d="M920 315 H1440" fill="none" stroke="#222" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="1180" y="268" text-anchor="middle" class="label">GDT 6302 order file</text>
  <text x="1180" y="292" text-anchor="middle" class="small">shared folder outbox</text>
  <text x="1180" y="416" text-anchor="middle" class="port">/data/gdt-bridge</text>

  <path d="M1440 375 H920" fill="none" stroke="#222" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="1180" y="456" text-anchor="middle" class="label">GDT 6310 result file</text>
  <text x="1180" y="480" text-anchor="middle" class="small">PDF / XML artifact references</text>
  <text x="1180" y="504" text-anchor="middle" class="port">shared folder inbound</text>

  <path d="M640 375 H450" fill="none" stroke="#222" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="545" y="430" text-anchor="middle" class="label">parsed result context</text>

  <path d="M310 400 C360 460 430 484 485 484" fill="none" stroke="#666" stroke-width="2.5" stroke-dasharray="8 6" marker-end="url(#dashArrow)"/>
  <text x="205" y="498" class="small">local state / audit / retry</text>

  <text x="80" y="642" class="section">dcm4chee Workflow</text>
  <rect x="80" y="670" width="1000" height="420" rx="10" fill="none" stroke="#333" stroke-width="2"/>
  <text x="110" y="705" class="frame-label">Docker Container</text>

  <rect x="170" y="800" width="280" height="110" rx="8" fill="#fff" stroke="#222" stroke-width="2"/>
  <text x="310" y="844" text-anchor="middle" class="node-title">Dashboard</text>
  <text x="310" y="875" text-anchor="middle" class="node-sub">Healthcare Lab UI</text>

  <rect x="640" y="800" width="280" height="110" rx="8" fill="#fff" stroke="#222" stroke-width="2"/>
  <text x="780" y="844" text-anchor="middle" class="node-title">dcm4chee</text>
  <text x="780" y="875" text-anchor="middle" class="node-sub">DICOM Archive / MWL</text>

  <rect x="1440" y="800" width="280" height="110" rx="8" fill="#fff" stroke="#222" stroke-width="2"/>
  <text x="1580" y="844" text-anchor="middle" class="node-title">AP</text>
  <text x="1580" y="875" text-anchor="middle" class="node-sub">ECG AP simulator</text>

  <rect x="198" y="965" width="224" height="88" rx="8" fill="#fff" stroke="#666" stroke-width="2"/>
  <text x="310" y="1002" text-anchor="middle" class="node-title" style="font-size:24px">Local SQLite DB</text>
  <text x="310" y="1030" text-anchor="middle" class="node-sub" style="font-size:16px">PACS/MWL ledger</text>
  <text x="310" y="1050" text-anchor="middle" class="node-sub" style="font-size:15px">attempt audit / mapping</text>

  <path d="M450 800 C520 735 600 735 670 800" fill="none" stroke="#222" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="560" y="746" text-anchor="middle" class="label">HL7 ADT^A04 patient sync</text>
  <text x="560" y="770" text-anchor="middle" class="port">dcm4chee:2575</text>

  <path d="M450 825 H640" fill="none" stroke="#222" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="545" y="932" text-anchor="middle" class="label">DICOM MWL create/query</text>
  <text x="545" y="956" text-anchor="middle" class="small">REST application/dicom+json</text>
  <text x="545" y="980" text-anchor="middle" class="port">dcm4chee:8082</text>

  <path d="M920 825 H1440" fill="none" stroke="#222" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="1180" y="766" text-anchor="middle" class="label">MWL query / DICOM store</text>
  <text x="1180" y="790" text-anchor="middle" class="small">DICOM DIMSE / C-FIND / C-STORE</text>
  <text x="1180" y="932" text-anchor="middle" class="port">dcm4chee:11112</text>

  <path d="M1440 885 H920" fill="none" stroke="#222" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="1180" y="976" text-anchor="middle" class="label">DICOM study/result stored</text>
  <text x="1180" y="1000" text-anchor="middle" class="small">Study UID / Accession mapping</text>

  <path d="M640 885 H450" fill="none" stroke="#222" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="545" y="1034" text-anchor="middle" class="label">verification / reconciliation</text>
  <text x="545" y="1058" text-anchor="middle" class="small">Dashboard reads MWL status</text>

  <path d="M310 910 V965" fill="none" stroke="#666" stroke-width="2.5" stroke-dasharray="8 6" marker-end="url(#dashArrow)"/>
  <text x="450" y="1068" text-anchor="start" class="small">local identifiers / retry history</text>
</svg>
